name: Deploy to shinyapps.io

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # Restores the package library from renv.lock.
      # NOTE: this requires renv.lock to exist - it is created once Claude Code
      # scaffolds the golem package and you run renv::snapshot().
      - uses: r-lib/actions/setup-renv@v2

      - name: Ensure rsconnect is available
        run: Rscript -e 'if (!requireNamespace("rsconnect", quietly = TRUE)) install.packages("rsconnect")'

      - name: Deploy
        env:
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          Rscript -e '
            rsconnect::setAccountInfo(
              name   = Sys.getenv("SHINYAPPS_NAME"),
              token  = Sys.getenv("SHINYAPPS_TOKEN"),
              secret = Sys.getenv("SHINYAPPS_SECRET")
            )
            # dependencyResolution = "library": resolve deps from the renv
            # library restored by setup-renv, rather than re-checking it against
            # renv.lock. Newer rsconnect aborts when the library and lockfile
            # differ (the rsconnect install above adds packages not in the lock),
            # so this keeps the deploy robust to that toolchain drift.
            rsconnect::deployApp(
              appName = "bayesadapt",
              forceUpdate = TRUE,
              dependencyResolution = "library"
            )
          '
