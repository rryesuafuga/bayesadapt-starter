name: Deploy shinylive demo to GitHub Pages

# Builds the standalone conjugate MVP (inst/shinylive/app.R) into a static
# WebAssembly site and publishes it to GitHub Pages. No server needed - it runs
# entirely in the visitor's browser via shinylive / webR.
#
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source:
#   "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install shinylive
        run: Rscript -e 'install.packages("shinylive")'

      - name: Export shinylive site
        run: Rscript -e 'shinylive::export("inst/shinylive", "_site")'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
